    <path d="M38,285 C22,284 12,295 10,310" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
    <!-- Mane flames -->
    <path d="M85,210 C78,195 88,185 94,195" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M100,202 C95,188 105,180 108,192" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M115,195 C112,182 122,176 124,188" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
    <!-- Front claws -->
    <path d="M118,220 C108,232 100,240 95,248" fill="none" stroke="#C9A84C" stroke-width="2"/>
    <path d="M95,248 C88,242 88,234 93,234" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <path d="M95,248 C92,240 95,234 99,236" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <path d="M95,248 C97,241 101,238 104,240" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <!-- Rear claws -->
    <path d="M208,250 C198,262 192,272 188,280" fill="none" stroke="#C9A84C" stroke-width="2"/>
    <path d="M188,280 C182,274 182,266 186,266" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <path d="M188,280 C185,272 188,266 192,268" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <!-- Tail fire -->
    <path d="M348,372 C355,378 348,388 342,382" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
    <path d="M348,372 C358,374 362,386 355,388" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
    <path d="M348,372 C356,368 365,374 360,382" fill="none" stroke="#C9A84C" stroke-width="2"/>
  </g>

  <!-- Right: Phoenix (鳳凰) silhouette -->
  <g fill="#C9A84C" opacity="0.9">
    <!-- Phoenix body -->
    <path d="M750,260 C755,242 745,225 730,215 C715,205 698,202 688,210

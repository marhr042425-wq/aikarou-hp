             C714,281 698,276 685,265 C672,254 655,242 638,238
             C621,234 608,240 612,255 C616,270 632,278 642,288
             C652,298 648,312 632,308 C616,304 600,290 585,285
             C572,281 565,288 570,300"
             fill="none" stroke="#C9A84C" stroke-width="7" stroke-linecap="round"/>
    <!-- Phoenix head with crest -->

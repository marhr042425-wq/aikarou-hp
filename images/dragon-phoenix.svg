             C141,238 158,225 175,218 C192,211 210,208 218,215
             C226,222 220,238 208,248 C196,258 182,268 180,282
             C178,296 192,295 208,285 C224,275 242,262 260,258
             C278,254 290,262 288,278 C286,294 270,302 258,310
             C246,318 248,332 262,330 C276,328 292,315 308,310
             C320,306 328,312 325,322 C322,332 312,338 305,345
             C298,352 300,362 312,358 C324,354 338,342 352,338
             C362,335 368,342 365,352 C362,360 352,365 348,372"

    <circle cx="735" cy="222" r="3" fill="#C9A84C"/>
    <circle cx="746" cy="218" r="3" fill="#C9A84C"/>
    <circle cx="757" cy="220" r="2.5" fill="#C9A84C"/>
    <!-- Wing (upper) -->
    <path d="M718,235 C730,218 748,210 760,215" fill="none" stroke="#C9A84C" stroke-width="2"/>
    <path d="M712,242 C725,228 742,222 752,225" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <!-- Tail feathers (flowing) -->
    <path d="M570,300 C560,310 555,325 560,340 C565,355 575,360 580,348
             C585,336 578,322 570,315" fill="none" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
    <path d="M570,300 C555,315 548,335 555,352 C562,369 575,372 578,358
             C581,344 572,328 562,318" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M570,300 C550,320 540,345 548,365 C556,385 572,385 575,370
             C578,355 568,335 558,322" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
    <!-- Tail feather eyes -->
    <circle cx="565" cy="342" r="4" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <circle cx="560" cy="355" r="4" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <circle cx="553" cy="368" r="3.5" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <!-- Body feather details -->
    <path d="M698,215 C705,208 712,212 708,220" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <path d="M685,238 C690,232 698,235 694,242" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <path d="M638,242 C643,236 650,240 646,246" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <!-- Legs -->
    <path d="M680,268 C675,280 670,290 665,295" fill="none" stroke="#C9A84C" stroke-width="2"/>
    <path d="M665,295 C660,290 660,284 664,284" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <path d="M665,295 C663,288 666,283 669,286" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  </g>

  <!-- Center pearl/orb between dragon and phoenix -->
  <circle cx="400" cy="300" r="20" stroke="#C9A84C" stroke-width="2" fill="none"/>
  <circle cx="400" cy="300" r="12" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="400" cy="300" r="5" fill="#C9A84C" opacity="0.7"/>
  <!-- Energy wisps -->
  <path d="M380,300 C376,288 382,276 394,274" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M420,300 C424,312 418,324 406,326" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.4"/>
</svg>